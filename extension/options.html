<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WorkBox — Options</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #0b0d12; color: #e7e9ef; }
    .wrap { max-width: 440px; margin: 40px auto; padding: 28px; background: #10131a; border: 1px solid #232836; border-radius: 16px; }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
    .logo { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(145deg, #8b5cf6, #6d28d9); display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; }
    h1 { font-size: 16px; margin: 0; font-weight: 600; }
    label { display: block; font-size: 12px; color: #9aa0b0; margin: 16px 0 6px; }
    input { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 9px; border: 1px solid #2a3040; background: #0b0d12; color: #e7e9ef; font-size: 14px; outline: none; }
    input:focus { border-color: #8b5cf6; }
    .hint { font-size: 12px; color: #6a7080; margin: 8px 0 0; }
    .hint a { color: #a78bfa; }
    button { margin-top: 20px; padding: 11px 20px; border: none; border-radius: 9px; background: linear-gradient(145deg, #8b5cf6, #6d28d9); color: #fff; font-weight: 600; font-size: 14px; cursor: pointer; }
    #status { margin-left: 12px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><div class="logo">W</div><h1>WorkBox extension</h1></div>
    <label>WorkBox URL</label>
    <input id="baseUrl" placeholder="https://workbox-blue.vercel.app" />
    <label>API key</label>
    <input id="apiKey" type="password" placeholder="wbx_live_…" />
    <p class="hint">Create a key in WorkBox → <b>Settings → API Keys</b>, then paste it here.</p>
    <div><button id="save">Save &amp; test</button><span id="status"></span></div>
  </div>
  <script src="wb.js"></script>
  <script src="options.js"></script>
</body>
</html>
